# Per-IP rate limit for the public API + MCP surfaces (both reach paid 0G
# inference). Generous burst for real users; caps scripted abuse.
limit_req_zone $binary_remote_addr zone=ogora:10m rate=2r/s;

server {
    listen 80;
    server_name 0gora.temporalabs.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name 0gora.temporalabs.com;

    ssl_certificate /etc/letsencrypt/live/0gora.temporalabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/0gora.temporalabs.com/privkey.pem;

    client_max_body_size 25m;

    # API goes straight to the backend (NOT through the Next.js proxy, which aborts
    # upstreams at ~30s — too short for 0G inference that can take 20–40s).
    location /api/ {
        limit_req zone=ogora burst=30 nodelay;
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Remote MCP endpoint for AI agents (POST /mcp). No URI rewrite — the MCP
    # container serves /mcp directly. Buffering off so streamed responses flush.
    location /mcp {
        limit_req zone=ogora burst=30 nodelay;
        proxy_pass http://mcp:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Optional self-hosted STT (the `voice` profile). The variable + resolver makes
    # nginx resolve `stt` at request time, so it starts fine even when voice is OFF
    # and the stt container doesn't exist (then /transcribe just 502s — never called,
    # since the web UI hides the mic unless voice is enabled).
    location /transcribe {
        limit_req zone=ogora burst=10 nodelay;
        resolver 127.0.0.11 valid=30s;
        set $stt_upstream stt:8092;
        proxy_pass http://$stt_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # The chat moved from /0g to /app (v0.2.3, multi-agora). Redirect old links/bookmarks.
    location = /0g { return 302 /app; }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
