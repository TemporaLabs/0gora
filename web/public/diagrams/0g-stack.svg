<svg viewBox="0 0 900 410" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3fa4"/><stop offset="0.55" stop-color="#b75fff"/><stop offset="1" stop-color="#9200e1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="410" rx="16" fill="#0f0f17"/>
  <text x="40" y="48" fill="#ededf2" font-size="26" font-weight="800">The 0G stack</text>
  <text x="40" y="74" fill="#9a9ab0" font-size="14">Decentralized infrastructure for AI — four pillars. 0Gora is colored by what it uses.</text>

  <!-- Chain -->
  <rect x="40" y="100" width="190" height="226" rx="13" fill="#14141c" stroke="#26263a"/>
  <text x="60" y="138" fill="#ededf2" font-size="18" font-weight="700">Chain</text>
  <text x="60" y="166" fill="#9a9ab0" font-size="12.5">EVM L1 optimized</text>
  <text x="60" y="184" fill="#9a9ab0" font-size="12.5">for AI — settlement</text>
  <text x="60" y="202" fill="#9a9ab0" font-size="12.5">&amp; coordination.</text>
  <rect x="60" y="280" width="118" height="26" rx="13" fill="#1a1a26" stroke="#3a3a4a"/>
  <text x="119" y="297" fill="#9a9ab0" font-size="12" font-weight="600" text-anchor="middle">Candidate · later</text>

  <!-- Compute (highlighted) -->
  <rect x="248" y="100" width="190" height="226" rx="13" fill="#14141c" stroke="url(#grad)" stroke-width="2"/>
  <text x="268" y="138" fill="#ededf2" font-size="18" font-weight="700">Compute</text>
  <text x="268" y="166" fill="#c9a9ff" font-size="12.5">Verifiable inference</text>
  <text x="268" y="184" fill="#c9a9ff" font-size="12.5">in a hardware TEE</text>
  <text x="268" y="202" fill="#c9a9ff" font-size="12.5">(TeeML attestation).</text>
  <rect x="268" y="280" width="150" height="26" rx="13" fill="url(#grad)"/>
  <text x="343" y="297" fill="#0a0a0f" font-size="12" font-weight="800" text-anchor="middle">✓ Load-bearing today</text>

  <!-- Storage -->
  <rect x="456" y="100" width="190" height="226" rx="13" fill="#14141c" stroke="#ffb74d" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="476" y="138" fill="#ededf2" font-size="18" font-weight="700">Storage</text>
  <text x="476" y="166" fill="#9a9ab0" font-size="12.5">Decentralized data —</text>
  <text x="476" y="184" fill="#9a9ab0" font-size="12.5">immutable Log +</text>
  <text x="476" y="202" fill="#9a9ab0" font-size="12.5">mutable KV.</text>
  <rect x="476" y="280" width="100" height="26" rx="13" fill="#1a1a26" stroke="#ffb74d"/>
  <text x="526" y="297" fill="#ffb74d" font-size="12" font-weight="700" text-anchor="middle">Roadmap</text>

  <!-- DA -->
  <rect x="664" y="100" width="190" height="226" rx="13" fill="#14141c" stroke="#26263a"/>
  <text x="684" y="138" fill="#ededf2" font-size="18" font-weight="700">DA</text>
  <text x="684" y="166" fill="#9a9ab0" font-size="12.5">High-throughput data</text>
  <text x="684" y="184" fill="#9a9ab0" font-size="12.5">availability for</text>
  <text x="684" y="202" fill="#9a9ab0" font-size="12.5">rollups &amp; appchains.</text>
  <rect x="684" y="280" width="96" height="26" rx="13" fill="#1a1a26" stroke="#3a3a4a"/>
  <text x="732" y="297" fill="#9a9ab0" font-size="12" font-weight="600" text-anchor="middle">Not used</text>

  <!-- legend -->
  <circle cx="48" cy="372" r="6" fill="url(#grad)"/>
  <text x="60" y="377" fill="#9a9ab0" font-size="12.5">In use today</text>
  <circle cx="200" cy="372" r="6" fill="none" stroke="#ffb74d" stroke-dasharray="3 2"/>
  <text x="212" y="377" fill="#9a9ab0" font-size="12.5">Planned (roadmap)</text>
  <circle cx="372" cy="372" r="6" fill="#1a1a26" stroke="#3a3a4a"/>
  <text x="384" y="377" fill="#9a9ab0" font-size="12.5">Not used yet</text>
</svg>
