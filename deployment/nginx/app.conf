server {
    listen 80;
    server_name 0gora.temporalabs.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name 0gora.temporalabs.com;

    ssl_certificate /etc/letsencrypt/live/0gora.temporalabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/0gora.temporalabs.com/privkey.pem;

    client_max_body_size 25m;

    # API goes straight to the backend (NOT through the Next.js proxy, which aborts
    # upstreams at ~30s — too short for 0G inference that can take 20–40s).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
