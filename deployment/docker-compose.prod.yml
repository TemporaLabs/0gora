# Prod overlay: adds nginx (TLS for 0gora.temporalabs.com) + certbot in front of web.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
name: 0gora

services:
  # Hard guarantee: production never serves mock answers, even if a stray .env
  # with ZEROG_MOCK=true lands on the box. This overlay pins it to false.
  zerog:
    environment:
      - ZEROG_MOCK=false

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
